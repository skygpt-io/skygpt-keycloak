apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Vendored Keycloak Operator install manifests from
# https://github.com/keycloak/keycloak-k8s-resources @ tag 26.6.2.
#
# Bundled here so consumers (skygpt-infra's keycloak component, etc.)
# pull a single cosign-signed OCI artifact rather than fetching from
# upstream at install time. See REQ-AUTHZ-031 in skygpt-infra's
# storage/specs/runtime-authz-pilot-requirements.md.
#
# Image override: `kubernetes.yml`'s Deployment ships
# `quay.io/keycloak/keycloak-operator:26.6.2` which the kustomize
# `images:` directive rewrites to the upstream-mirror path. Consumers
# in skygpt-infra do not need to re-do this rewrite.
#
# Namespace: the operator install does NOT set namespace on its
# Deployment/RoleBinding/etc. (deliberate — kept that way to let
# consumers place it). Consumers' kustomize layer must apply a
# `namespace: <ns>` directive.
resources:
  - kubernetes.yml
  - keycloaks.k8s.keycloak.org-v1.yml
  - keycloakrealmimports.k8s.keycloak.org-v1.yml

images:
  - name: quay.io/keycloak/keycloak-operator
    newName: us-east4-docker.pkg.dev/skygpt-platform/skygpt-registry/upstream-mirror/images/keycloak-operator
